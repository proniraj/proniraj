<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bgGlow" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="nameGradient" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient glow -->
  <circle cx="980" cy="120" r="160" fill="#3b82f6" opacity="0.08" filter="url(#softGlow)"/>
  <circle cx="180" cy="520" r="140" fill="#10b981" opacity="0.07" filter="url(#softGlow)"/>

  <!-- Top accent bar -->
  <rect x="80" y="72" width="72" height="4" rx="2" fill="url(#accent)"/>

  <!-- Label -->
  <text x="80" y="118" fill="#666666" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18" letter-spacing="2">PORTFOLIO</text>

  <!-- Name -->
  <text x="80" y="210" fill="url(#nameGradient)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="72" font-weight="700">Niraj Thakur</text>

  <!-- Role -->
  <text x="80" y="268" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="34" font-weight="600">Full Stack Engineer</text>

  <!-- Tagline -->
  <text x="80" y="330" fill="#a0a0a0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="28" font-weight="400">Building SaaS, Fintech &amp; AI Products</text>
  <text x="80" y="368" fill="#a0a0a0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="28" font-weight="400">From Idea to Production</text>

  <!-- Status badge -->
  <rect x="80" y="408" width="268" height="42" rx="21" fill="#064e3b" fill-opacity="0.35" stroke="#10b981" stroke-opacity="0.45"/>
  <circle cx="104" cy="429" r="5" fill="#34d399"/>
  <text x="120" y="435" fill="#6ee7b7" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="500">OPEN TO REMOTE ROLES</text>

  <!-- Tech line -->
  <text x="80" y="510" fill="#737373" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18">React � TypeScript � Node.js � Next.js � NestJS � PostgreSQL � AWS</text>

  <!-- Footer URL -->
  <rect x="0" y="558" width="1200" height="72" fill="#111111" fill-opacity="0.85"/>
  <rect x="0" y="558" width="1200" height="1" fill="#333333"/>
  <text x="80" y="604" fill="url(#accent)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="24" font-weight="500">nirajthakur.com.np</text>

  <!-- Decorative bracket -->
  <path d="M1080 180 L1120 180 L1120 420 L1080 420" stroke="url(#accent)" stroke-width="3" stroke-opacity="0.35" fill="none"/>
  <path d="M1120 180 L1080 180" stroke="url(#accent)" stroke-width="3" stroke-opacity="0.35"/>
  <path d="M1120 420 L1080 420" stroke="url(#accent)" stroke-width="3" stroke-opacity="0.35"/>
</svg>
